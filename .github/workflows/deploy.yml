name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject SHEETS_URL into config.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_URL }}
        run: |
          if [ -n "$SHEETS_URL" ]; then
            sed -i "s|%%SHEETS_URL%%|${SHEETS_URL}|g" public/assets/js/config.js
            echo "SHEETS_URL injected."
          fi

      - name: Cache bust local assets
        run: |
          BUST="${GITHUB_SHA:0:8}"
          find public -name "*.html" | while read f; do
            sed -i \
              -e "s|\.css\"|\.css?v=${BUST}\"|g" \
              -e "s|\.css'|\.css?v=${BUST}'|g" \
              -e "s|\(assets/[^\"']*\)\.js\"|\1.js?v=${BUST}\"|g" \
              -e "s|\(assets/[^\"']*\)\.js'|\1.js?v=${BUST}'|g" \
              "$f"
          done
          echo "Cache bust ${BUST} applied."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
