<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Catálogo Pharmafit</title>
  <link rel="stylesheet" href="assets/css/theme.css"/>
  <link rel="stylesheet" href="assets/css/catalogo_interno.css"/>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="assets/img/logo_pharmafit.png" class="header-logo" alt="Pharmafit" onerror="this.style.display='none'"/>
  <div>
    <button onclick="history.back()" style="background:transparent;border:1px solid var(--border);color:var(--light);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;display:flex;align-items:center;gap:6px;flex-shrink:0">← Voltar</button>
    <div>
      <div class="header-title">Catálogo de Produtos</div>
      <div class="header-sub">Pharmafit — Atualizado em tempo real</div>
    </div>
  </div>
  <div class="header-spacer"></div>
  <div class="badge-count" id="badgeCount">Carregando…</div>
</div>

<!-- FILTROS -->
<div class="filters-wrap">
  <input class="search-box" id="searchInput" placeholder="🔍 Buscar produto..." oninput="filtrar()"/>
  <div class="filter-chips" id="chipsCat">
    <button class="chip active" data-cat="" onclick="setCategoria(this)">Todos</button>
  </div>
</div>

<!-- CATÁLOGO -->
<div class="catalog-wrap">
  <div id="loadingMsg" class="empty">
    <div class="empty-icon">⏳</div>
    <div style="font-size:1rem;font-weight:700">Carregando produtos…</div>
    <div style="font-size:.8rem;margin-top:6px;color:var(--gray)">Isso pode levar alguns segundos.</div>
  </div>
  <div id="catalogGrid" class="products-grid" style="display:none"></div>
  <div id="emptyMsg" class="empty" style="display:none">
    <div class="empty-icon">🔍</div>
    <div>Nenhum produto encontrado</div>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- CTA COMPRA -->
<div class="cta-bar">
  <div class="cta-bar-text">
    🛒 Gostou do que viu?
    <span>Para fazer seu pedido acesse a página de compras</span>
  </div>
  <a href="pedido_pharmafit.html" class="cta-bar-btn">Fazer Pedido →</a>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/catalogo_interno.js"></script>
</body>
</html>
